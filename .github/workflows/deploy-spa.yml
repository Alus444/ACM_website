name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: acm
        run: npm install

      - name: Fetch BOOTH items
        working-directory: acm
        run: node scripts/fetch-booth.mjs

      - name: Generate profile placeholder
        working-directory: acm
        run: node scripts/gen-profile-pro.mjs

      - name: Build Vue app
        working-directory: acm
        run: npm run build:alus

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: acm/dist
          cname: alus.ac-md.com
